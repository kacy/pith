name: ci
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: check formatting
        run: zig fmt --check bootstrap/

      - name: build
        run: zig build

      - name: test
        run: zig build test

      - name: check examples
        run: |
          for f in examples/*.fg; do
            result=$(./zig-out/bin/forge check "$f" 2>&1)
            if [ "$result" != "ok" ]; then
              echo "FAIL $f"
              echo "$result"
              exit 1
            fi
            echo "ok   $f"
          done

      - name: run examples
        run: make run-examples

      - name: build (release)
        run: zig build release

      - name: check examples (release)
        run: |
          for f in examples/*.fg; do
            result=$(./zig-out/bin/forge check "$f" 2>&1)
            if [ "$result" != "ok" ]; then
              echo "FAIL $f (release)"
              echo "$result"
              exit 1
            fi
            echo "ok   $f"
          done

      - name: build self-hosted compiler
        run: make self-host

      - name: run examples (self-hosted)
        run: make run-examples-self

      - name: verify bootstrap fixed point
        run: make bootstrap-verify

      - name: lint examples
        run: |
          for f in examples/*.fg; do
            ./self-host/forge_main lint "$f"
            if [ $? -ne 0 ]; then
              echo "FAIL lint $f"
              exit 1
            fi
          done

      - name: lint self-host
        run: |
          for f in self-host/*.fg; do
            ./self-host/forge_main lint "$f"
            if [ $? -ne 0 ]; then
              echo "FAIL lint $f"
              exit 1
            fi
          done

      - name: check examples (self-hosted)
        run: |
          for f in examples/*.fg; do
            result=$(./self-host/forge_main check "$f" 2>&1)
            if [ "$result" != "ok" ]; then
              echo "FAIL $f (self-hosted check)"
              echo "$result"
              exit 1
            fi
            echo "ok   $f"
          done

      - name: check forge formatting
        run: |
          for f in self-host/*.fg; do
            ./self-host/forge_main fmt --check "$f"
            if [ $? -ne 0 ]; then
              echo "FAIL $f not formatted"
              exit 1
            fi
          done

      - name: check doc coverage
        run: |
          for f in std/*.fg std/**/*.fg; do
            [ -f "$f" ] || continue
            ./self-host/forge_main doc --check "$f"
            if [ $? -ne 0 ]; then
              echo "FAIL $f missing doc comments"
              exit 1
            fi
          done
